<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc"><title id="title">Personal Hub V1 Selected Style</title><desc id="desc">A minimal orbit layout concept for a personal brand front door and navigation portal.</desc><rect width="1440" height="960" fill="#f7f2ea"/><path d="M108 136h1224M108 812h1224" fill="none" stroke="#b9afa3" stroke-width="1.5" opacity=".65"/><text x="108" y="106" fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">xiaowork.dev</text><text x="108" y="220" fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800">小站总站</text><text x="108" y="312" fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="800">Personal Hub</text><text x="108" y="444" fill="#5d5851" font-family="Inter, Arial, sans-serif" font-size="28">个人品牌门面 + 导航门户</text><text x="108" y="488" fill="#5d5851" font-family="Inter, Arial, sans-serif" font-size="28">博客、导航、作品、工具四个入口汇聚在一个安静首页。</text><rect x="108" y="552" width="156" height="52" rx="26" fill="#2d2a25"/><text x="142" y="586" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">进入导航</text><rect x="284" y="552" width="136" height="52" rx="26" fill="none" stroke="#2d2a25" stroke-width="1.4"/><text x="320" y="586" fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">看作品</text><circle cx="1078" cy="446" r="248" fill="#fffdf9" stroke="#d8cfc3" stroke-width="1.5"/><circle cx="1078" cy="446" r="168" fill="none" stroke="#d8cfc3" stroke-width="1.3" stroke-dasharray="8 12"/><circle cx="1078" cy="446" r="88" fill="#2d2a25"/><text x="1078" y="436" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">总站</text><text x="1078" y="474" text-anchor="middle" fill="#d8cfc3" font-family="Inter, Arial, sans-serif" font-size="17">Hub</text><circle cx="1078" cy="232" r="36" fill="#e85d3f"/><circle cx="1292" cy="446" r="36" fill="#2f7d6d"/><circle cx="1078" cy="660" r="36" fill="#f0b44c"/><circle cx="864" cy="446" r="36" fill="#5c6bc0"/><g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle"><text x="1078" y="240" fill="#fff">博客</text><text x="1292" y="454" fill="#fff">导航</text><text x="1078" y="668" fill="#332a1a">作品</text><text x="864" y="454" fill="#fff">工具</text></g><text x="108" y="704" fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">精选入口</text><g fill="#fffdf9" stroke="#d8cfc3" stroke-width="1.2"><rect x="108" y="738" width="286" height="86" rx="18"/><rect x="422" y="738" width="286" height="86" rx="18"/><rect x="736" y="738" width="286" height="86" rx="18"/><rect x="1050" y="738" width="286" height="86" rx="18"/></g><g fill="#2d2a25" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800"><text x="134" y="790">最新博客</text><text x="448" y="790">常用导航</text><text x="762" y="790">作品索引</text><text x="1076" y="790">在线工具</text></g></svg>
